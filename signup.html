<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Account — The Capital Gains Institute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0b1220;--navy2:#111c33;--gold:#c9a24b;--gold-bright:#e7c878;--cream:#f6f1e7;--muted:#aab3c2;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--cream);
    background:linear-gradient(125deg,#0b1220,#13233f,#0e1830,#1a2e52,#0b1220);background-size:400% 400%;
    animation:drift 24s ease-in-out infinite;display:flex;align-items:center;justify-content:center;padding:36px 18px;}
  @keyframes drift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .card{width:100%;max-width:560px;background:rgba(17,28,51,.6);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(201,162,75,.28);border-radius:20px;padding:34px 34px 30px;box-shadow:0 40px 100px -36px rgba(0,0,0,.85);}
  .monogram{font-family:'Fraunces',serif;font-weight:600;letter-spacing:.06em;font-size:14px;color:var(--gold-bright);
    border:1px solid rgba(201,162,75,.5);border-radius:999px;padding:6px 15px;display:inline-block;margin-bottom:16px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;line-height:1.1;margin-bottom:6px;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
  label{display:block;font-size:12.5px;font-weight:500;color:var(--cream);margin:14px 0 6px;}
  label .req{color:var(--gold-bright);}
  .row{display:flex;gap:14px;}
  .row > div{flex:1;}
  input,select{width:100%;padding:13px 14px;border-radius:11px;border:1px solid rgba(255,255,255,.16);
    background:rgba(8,13,24,.6);color:var(--cream);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
  input::placeholder{color:#7d8696;}
  input:focus,select:focus{border-color:var(--gold);}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='%23aab3c2' viewBox='0 0 16 16'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 14px center;}
  .agree{display:flex;align-items:flex-start;gap:9px;margin:20px 0 6px;font-size:12.5px;color:var(--muted);}
  .agree input{width:auto;margin-top:2px;}
  .agree a{color:var(--gold-bright);text-decoration:none;}
  button.cta{width:100%;margin-top:16px;padding:15px;border:none;border-radius:12px;cursor:pointer;font-weight:600;font-size:16px;
    color:#1b1405;background:linear-gradient(180deg,var(--gold-bright),var(--gold));transition:transform .12s,box-shadow .2s;
    box-shadow:0 12px 30px -10px rgba(201,162,75,.6);}
  button.cta:hover{transform:translateY(-1px);box-shadow:0 16px 36px -10px rgba(201,162,75,.75);}
  .foot{text-align:center;margin-top:16px;font-size:12.5px;color:var(--muted);}
  .foot a{color:var(--gold-bright);text-decoration:none;}
</style>
</head>
<body>
  <div class="card">
    <div class="monogram">C&nbsp;&middot;&nbsp;G&nbsp;&middot;&nbsp;I</div>
    <h1>Create your account</h1>
    <p class="sub">A few quick details and you're inside the Institute.</p>

    <form action="https://formspree.io/f/mdardyzq" method="POST">
      <input type="hidden" name="_subject" value="New CGI sign-up">
      <input type="hidden" name="_next" value="https://thecgi.org/institute.html">

      <label>Email <span class="req">*</span></label>
      <input type="email" name="email" placeholder="name@company.com" required>

      <div class="row">
        <div>
          <label>First name <span class="req">*</span></label>
          <input type="text" name="first_name" placeholder="First name" required>
        </div>
        <div>
          <label>Last name <span class="req">*</span></label>
          <input type="text" name="last_name" placeholder="Last name" required>
        </div>
      </div>

      <label>Phone number <span class="req">*</span></label>
      <input type="tel" name="phone" placeholder="+1 (555) 000-0000" required>

      <label>Company name</label>
      <input type="text" name="company" placeholder="Your company">

      <label>Company website</label>
      <input type="url" name="website" placeholder="https://yourcompany.com">

      <label>What is your monthly revenue? <span class="req">*</span></label>
      <select name="monthly_revenue" required>
        <option value="" disabled selected>Select a range</option>
        <option>Under $25,000</option>
        <option>$25,000 &ndash; $100,000</option>
        <option>$100,000 &ndash; $500,000</option>
        <option>$500,000 &ndash; $1M</option>
        <option>Over $1M</option>
      </select>

      <div class="agree">
        <input type="checkbox" id="tos" required>
        <label for="tos" style="margin:0;font-weight:400;color:var(--muted);">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
      </div>

      <button type="submit" class="cta">Create my account &rarr;</button>
    </form>

    <p class="foot">Already a member? <a href="institute.html">Enter the Institute &rarr;</a></p>
  </div>

  <script>
    (function(){
      try{
        var em = new URLSearchParams(location.search).get('email');
        if(em){ var f = document.querySelector('input[name="email"]'); if(f){ f.value = em; } }
      }catch(_){}
    })();
  </script>
</body>
</html>
